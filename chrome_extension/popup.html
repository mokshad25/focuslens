<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusLens</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      background: #0D1117;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      color: #E6EDF3;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #00C9A7, #0066CC);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .title h1 {
      font-size: 1rem;
      font-weight: 600;
      color: #E6EDF3;
      letter-spacing: -0.02em;
    }
    .title p {
      font-size: 0.68rem;
      color: #8B949E;
      margin-top: 1px;
    }

    .status-card {
      background: #161B22;
      border: 1px solid #21262D;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .status-row:last-child { margin-bottom: 0; }

    .status-label {
      font-size: 0.7rem;
      color: #8B949E;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .dot-green  { background: #00C9A7; box-shadow: 0 0 6px #00C9A7; }
    .dot-red    { background: #FF6B6B; }
    .dot-grey   { background: #8B949E; }

    .status-val {
      font-size: 0.75rem;
      color: #C9D1D9;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      transition: all 0.15s;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: #00C9A7;
      color: #0D1117;
    }
    .btn-primary:hover { background: #00E5C0; }

    .btn-secondary {
      background: #21262D;
      color: #E6EDF3;
      border: 1px solid #30363D;
    }
    .btn-secondary:hover { background: #2D333B; border-color: #00C9A7; }

    .btn-danger {
      background: transparent;
      color: #FF6B6B;
      border: 1px solid #30363D;
    }
    .btn-danger:hover { background: rgba(255,107,107,0.08); border-color: #FF6B6B; }

    .divider {
      height: 1px;
      background: #21262D;
      margin: 12px 0;
    }

    .footer {
      font-size: 0.65rem;
      color: #484F58;
      text-align: center;
      margin-top: 10px;
    }

    .port-input {
      width: 100%;
      background: #161B22;
      border: 1px solid #21262D;
      border-radius: 6px;
      padding: 7px 10px;
      color: #E6EDF3;
      font-family: inherit;
      font-size: 0.78rem;
      margin-bottom: 8px;
      outline: none;
    }
    .port-input:focus { border-color: #00C9A7; }

    .section-label {
      font-size: 0.68rem;
      color: #8B949E;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">🔬</div>
    <div class="title">
      <h1>FocusLens</h1>
      <p>Productivity Analytics</p>
    </div>
  </div>

  <!-- Server status -->
  <div class="status-card">
    <div class="status-row">
      <span class="status-label">Dashboard</span>
      <span class="status-val" id="server-status">
        <span class="status-dot dot-grey" id="status-dot"></span>
        Checking…
      </span>
    </div>
    <div class="status-row">
      <span class="status-label">Port</span>
      <span class="status-val" id="port-display">8501</span>
    </div>
  </div>

  <!-- Open dashboard -->
  <button class="btn btn-primary" id="open-btn">
    <span>⚡</span> Open Dashboard
  </button>

  <div class="divider"></div>

  <!-- Port config -->
  <p class="section-label">Custom Port</p>
  <input class="port-input" type="number" id="port-input"
         placeholder="8501" min="1024" max="65535" />
  <button class="btn btn-secondary" id="save-port-btn">Save Port</button>

  <div class="divider"></div>

  <!-- Quick instructions -->
  <p class="section-label">Quick Start</p>
  <button class="btn btn-secondary" id="instructions-btn">📋 How to start server</button>

  <div id="instructions" style="display:none; margin-top:8px;">
    <div class="status-card" style="font-size:0.7rem; color:#8B949E; line-height:1.6;">
      <strong style="color:#C9D1D9;">Terminal commands:</strong><br>
      <span style="color:#00C9A7;">cd</span> /path/to/focuslens<br>
      <span style="color:#00C9A7;">python</span> pipeline.py --demo<br>
      <span style="color:#00C9A7;">streamlit</span> run dashboard.py
    </div>
  </div>

  <div class="footer">🔒 100% local · No data leaves your machine</div>

  <script src="popup.js"></script>
</body>
</html>
